<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CivicDuty - Global Sovereign Infrastructure</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fadeIn { animation: fadeIn 0.2s ease-out forwards; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 font-sans antialiased selection:bg-emerald-500 selection:text-black">

    <div class="max-w-md mx-auto min-h-screen bg-zinc-950 border-x border-zinc-800 flex flex-col justify-between shadow-2xl relative">
        
        <!-- App Header (Hidden during Portal Selection) -->
        <header id="app-header" class="p-4 border-b border-zinc-900 sticky top-0 bg-zinc-950/80 backdrop-blur z-10 flex justify-between items-center hidden">
            <div class="flex items-center gap-2">
                <div class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></div>
                <h1 class="text-lg font-bold tracking-tight uppercase text-zinc-200">CivicDuty</h1>
            </div>
            <div class="flex items-center gap-2">
                <span id="badge-role" class="text-[9px] font-mono px-1.5 py-0.5 rounded font-bold uppercase tracking-wider">CITIZEN</span>
                <span id="country-node" class="text-xs font-mono px-2 py-0.5 bg-zinc-900 rounded text-zinc-400 border border-zinc-800">UG_NODE_01</span>
            </div>
        </header>

        <!-- Dynamic Main Render Viewport -->
        <main id="main-content" class="flex-1 p-4 overflow-y-auto space-y-4">
            <!-- Programmatically injected view content -->
        </main>

        <!-- Bottom Navigation Rail (Context Dependent) -->
        <nav id="app-nav" class="border-t border-zinc-900 p-2 bg-zinc-950 flex justify-around items-center sticky bottom-0 hidden">
            <!-- Nav buttons dynamically changed depending on User Role -->
        </nav>
    </div>

    <script>
        // --- Core Global State Management ---
        let currentView = 'portal_select'; 
        let userRole = 'citizen'; // citizen | government
        let selectedCountry = 'Uganda';
        let nodeTag = 'UG_NODE_01';
        let assignedDeptId = 'nwsc'; 
        let uploadedMockMedia = null;

        // Structured Global Hierarchy Setup
        const standardHierarchies = {
            "Uganda": { struct: "Ministry", tag: "UG_NODE_01" },
            "Kenya": { struct: "Ministry", tag: "KE_NODE_02" },
            "Nigeria": { struct: "Federal Ministry", tag: "NG_NODE_05" },
            "United States": { struct: "Federal Department", tag: "US_NODE_12" },
            "United Kingdom": { struct: "HM Department", tag: "UK_NODE_08" },
            "Ghana": { struct: "Ministry", tag: "GH_NODE_03" }
        };

        let dynamicDepartments = [
            { id: 'nwsc', country: 'Uganda', name: "National Water & Sewerage Corp", followed: true, icon: "💧" },
            { id: 'unra', country: 'Uganda', name: "National Roads Authority (UNRA)", followed: true, icon: "🛣️" },
            { id: 'umeme', country: 'Uganda', name: "Umeme Electricity Grid", followed: false, icon: "⚡" },
            { id: 'kcaa', country: 'Kenya', name: "Civil Aviation Authority (KCAA)", followed: true, icon: "✈️" },
            { id: 'npa', country: 'Nigeria', name: "Nigerian Ports Authority", followed: true, icon: "⚓" },
            { id: 'dot', country: 'United States', name: "Department of Transportation (DOT)", followed: true, icon: "🚘" }
        ];

        let masterTickets = [
            { 
                id: 1, 
                country: "Uganda",
                title: "Main Street Water Main Burst", 
                deptId: "nwsc",
                dept: "National Water & Sewerage Corp", 
                status: "Resolved", 
                color: "text-emerald-400 bg-emerald-400/10", 
                location: "Sector 4", 
                time: "2h ago",
                caption: "Water pressure has completely destroyed the sidewalk asphalt here. Flooding houses.",
                citizenMedia: "📸 sidewalk_flood.jpg",
                govResponse: {
                    author: "NWSC Engineering Hub",
                    message: "Emergency response team dispatched. Repaired broken valve line and cleared the asphalt debris. Service restored at 10:45 AM.",
                    attachment: "📄 Works_Receipt_#4429.pdf",
                    media: "Before/After Assets Linked"
                }
            },
            { 
                id: 2, 
                country: "Uganda",
                title: "Grid Transformer Blown", 
                deptId: "umeme",
                dept: "Umeme Electricity Grid", 
                status: "In Progress", 
                color: "text-amber-400 bg-amber-400/10", 
                location: "Kisenyi Ring Rd", 
                time: "5h ago",
                caption: "Loud pop heard at 4 AM, entire block is blacked out. Smoke was coming from the pole transformer box.",
                citizenMedia: "📸 burnt_transformer.mov",
                govResponse: null
            },
            { 
                id: 3, 
                country: "United States",
                title: "Interstate-95 Bridge Expansion Joint Fault", 
                deptId: "dot",
                dept: "Department of Transportation (DOT)", 
                status: "Pending", 
                color: "text-zinc-400 bg-zinc-400/10", 
                location: "Exit 24 Overpass", 
                time: "1d ago",
                caption: "Visible 3-inch gap showing on structural transition span. Loud clangs when trucks pass.",
                citizenMedia: "📸 joint_gap.png",
                govResponse: null
            }
        ];

        const mainContent = document.getElementById('main-content');
        const appHeader = document.getElementById('app-header');
        const appNav = document.getElementById('app-nav');
        const nodeLabel = document.getElementById('country-node');
        const roleLabel = document.getElementById('badge-role');

        // --- Route Navigation Matrix ---
        function navigateTo(view) {
            currentView = view;
            
            if (view === 'portal_select' || view === 'citizen_onboarding' || view === 'gov_onboarding') {
                appHeader.classList.add('hidden');
                appNav.classList.add('hidden');
            } else {
                appHeader.classList.remove('hidden');
                appNav.classList.remove('hidden');
                nodeLabel.innerText = nodeTag;
                
                if(userRole === 'government') {
                    roleLabel.innerText = "GOV_OFFICIAL";
                    roleLabel.className = "text-[9px] font-mono px-1.5 py-0.5 rounded font-bold uppercase tracking-wider bg-amber-500/10 text-amber-400 border border-amber-500/20";
                } else {
                    roleLabel.innerText = "CITIZEN";
                    roleLabel.className = "text-[9px] font-mono px-1.5 py-0.5 rounded font-bold uppercase tracking-wider bg-emerald-500/10 text-emerald-400 border border-emerald-500/20";
                }
                buildDynamicNavbar();
            }
            render();
        }

        function render() {
            mainContent.classList.remove('animate-fadeIn');
            void mainContent.offsetWidth; 
            mainContent.classList.add('animate-fadeIn');

            switch(currentView) {
                case 'portal_select': renderPortalSelect(); break;
                case 'citizen_onboarding': renderCitizenOnboarding(); break;
                case 'gov_onboarding': renderGovOnboarding(); break;
                case 'feed': renderFeed(); break;
                case 'departments': renderDepartments(); break;
                case 'report': renderReportForm(); break;
                case 'gov_dashboard': renderGovDashboard(); break;
                case 'create_dept': renderCreateDepartment(); break;
            }
        }

        // --- Dynamic Navigation Builders ---
        function buildDynamicNavbar() {
            if (userRole === 'government') {
                appNav.innerHTML = `
                    <button id="nav-gov-dash" class="flex flex-col items-center gap-1 py-2 px-4 rounded-xl text-emerald-400">
                        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" /></svg>
                        <span class="text-[10px] font-medium tracking-wide">Tickets Inbox</span>
                    </button>
                    <button id="nav-create-dept" class="flex flex-col items-center gap-1 py-2 px-4 rounded-xl text-zinc-500 hover:text-zinc-300">
                        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3m0 0v3m0-3h3m-3 0H9m12 0a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                        <span class="text-[10px] font-medium tracking-wide">Add Agency</span>
                    </button>
                    <button onclick="navigateTo('portal_select')" class="flex flex-col items-center gap-1 py-2 px-4 rounded-xl text-zinc-600 hover:text-red-400">
                        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" /></svg>
                        <span class="text-[10px] font-medium tracking-wide">Exit</span>
                    </button>
                `;
                document.getElementById('nav-gov-dash').addEventListener('click', () => { updateGovNavUI('gov_dashboard'); navigateTo('gov_dashboard'); });
                document.getElementById('nav-create-dept').addEventListener('click', () => { updateGovNavUI('create_dept'); navigateTo('create_dept'); });
            } else {
                appNav.innerHTML = `
                    <button id="nav-feed" class="flex flex-col items-center gap-1 py-2 px-4 rounded-xl text-emerald-400">
                        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" /></svg>
                        <span class="text-[10px] font-medium tracking-wide">Registry</span>
                    </button>
                    <button id="nav-departments" class="flex flex-col items-center gap-1 py-2 px-4 rounded-xl text-zinc-500 hover:text-zinc-300">
                        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" /></svg>
                        <span class="text-[10px] font-medium tracking-wide">Directory</span>
                    </button>
                    <button id="nav-report" class="flex flex-col items-center gap-1 py-2 px-4 rounded-xl text-zinc-500 hover:text-zinc-300">
                        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4" /></svg>
                        <span class="text-[10px] font-medium tracking-wide">File Ticket</span>
                    </button>
                `;
                document.getElementById('nav-feed').addEventListener('click', () => { updateCitizenNavUI('feed'); navigateTo('feed'); });
                document.getElementById('nav-departments').addEventListener('click', () => { updateCitizenNavUI('departments'); navigateTo('departments'); });
                document.getElementById('nav-report').addEventListener('click', () => { updateCitizenNavUI('report'); navigateTo('report'); });
            }
        }

        function updateCitizenNavUI(active) {
            document.getElementById('nav-feed').className = `flex flex-col items-center gap-1 py-2 px-4 rounded-xl transition-colors ${active === 'feed' ? 'text-emerald-400' : 'text-zinc-500 hover:text-zinc-300'}`;
            document.getElementById('nav-departments').className = `flex flex-col items-center gap-1 py-2 px-4 rounded-xl transition-colors ${active === 'departments' ? 'text-emerald-400' : 'text-zinc-500 hover:text-zinc-300'}`;
            document.getElementById('nav-report').className = `flex flex-col items-center gap-1 py-2 px-4 rounded-xl transition-colors ${active === 'report' ? 'text-emerald-400' : 'text-zinc-500 hover:text-zinc-300'}`;
        }

        function updateGovNavUI(active) {
            document.getElementById('nav-gov-dash').className = `flex flex-col items-center gap-1 py-2 px-4 rounded-xl transition-colors ${active === 'gov_dashboard' ? 'text-emerald-400' : 'text-zinc-500 hover:text-zinc-300'}`;
            document.getElementById('nav-create-dept').className = `flex flex-col items-center gap-1 py-2 px-4 rounded-xl transition-colors ${active === 'create_dept' ? 'text-emerald-400' : 'text-zinc-500 hover:text-zinc-300'}`;
        }

        // --- View 1: Core Portal Select Gate ---
        function renderPortalSelect() {
            mainContent.innerHTML = `
                <div class="space-y-6 pt-12 pb-4 text-center">
                    <div class="space-y-2">
                        <div class="inline-flex p-4 rounded-3xl bg-zinc-900 border border-zinc-800 text-3xl shadow-inner">⚡</div>
                        <h2 class="text-2xl font-black tracking-tight text-zinc-100">CIVICDUTY GLOBAL</h2>
                        <p class="text-xs text-zinc-400 max-w-xs mx-auto">Sovereign infrastructure network for immediate national resolution logs.</p>
                    </div>

                    <div class="space-y-3 pt-6">
                        <button onclick="userRole='citizen'; navigateTo('citizen_onboarding');" class="w-full bg-zinc-900 hover:bg-zinc-850 border border-zinc-800 p-5 rounded-2xl text-left transition-all flex justify-between items-center group">
                            <div class="space-y-1">
                                <span class="text-sm font-bold text-zinc-200 block">Sovereign Citizen Access</span>
                                <span class="text-xs text-zinc-500 block">File geo-verified logs, follow local agency frameworks.</span>
                            </div>
                            <span class="text-zinc-600 group-hover:text-emerald-400 transition-colors">➔</span>
                        </button>

                        <button onclick="userRole='government'; navigateTo('gov_onboarding');" class="w-full bg-zinc-900 hover:bg-zinc-850 border border-zinc-800 p-5 rounded-2xl text-left transition-all flex justify-between items-center group">
                            <div class="space-y-1">
                                <span class="text-sm font-bold text-amber-400 block">State Administrator Access</span>
                                <span class="text-xs text-zinc-500 block">Deploy resolution metrics, attach work orders, modify nodes.</span>
                            </div>
                            <span class="text-zinc-600 group-hover:text-amber-400 transition-colors">➔</span>
                        </button>
                    </div>
                </div>
            `;
        }

        // --- View 2: Citizen Document Secure Onboarding ---
        function renderCitizenOnboarding() {
            mainContent.innerHTML = `
                <div class="space-y-5 pt-4">
                    <div class="flex items-center gap-2" onclick="navigateTo('portal_select')">
                        <span class="text-xs text-zinc-500 cursor-pointer hover:text-zinc-300">⇜ Back to Access Gate</span>
                    </div>
                    <div>
                        <h2 class="text-xl font-bold tracking-tight text-zinc-100">Verify Citizen Ledger</h2>
                        <p class="text-xs text-zinc-400">Cryptographically lock your interface into your sovereign domestic node.</p>
                    </div>

                    <div class="space-y-4 bg-zinc-900/40 p-5 rounded-2xl border border-zinc-900">
                        <label class="block space-y-1.5">
                            <span class="text-xs font-semibold text-zinc-400 uppercase tracking-wider">Select Nation State</span>
                            <select id="citizen-country-select" class="w-full bg-zinc-900 border border-zinc-800 rounded-xl p-3 text-sm text-zinc-200 focus:outline-none focus:border-emerald-500">
                                ${Object.keys(standardHierarchies).map(c => `<option value="${c}">${c}</option>`).join('')}
                            </select>
                        </label>

                        <div class="space-y-1.5">
                            <span class="text-xs font-semibold text-zinc-400 uppercase tracking-wider block">Identity Document Type</span>
                            <div class="grid grid-cols-2 gap-2">
                                <button class="p-3 text-xs bg-zinc-900 border border-zinc-700 rounded-xl font-medium text-emerald-400">🪪 National ID Card</button>
                                <button class="p-3 text-xs bg-zinc-900 border border-zinc-900 rounded-xl font-medium text-zinc-400"> Passport Document</button>
                            </div>
                        </div>

                        <div class="border border-dashed border-zinc-800 rounded-xl p-6 text-center bg-zinc-950">
                            <span class="text-xs text-zinc-500 block">Awaiting biometric or document camera scan...</span>
                        </div>
                    </div>

                    <button id="btn-confirm-citizen" class="w-full bg-zinc-100 hover:bg-white text-zinc-950 font-semibold rounded-xl py-3.5 text-sm transition-all">
                        Initialize Node View
                    </button>
                </div>
            `;

            document.getElementById('btn-confirm-citizen').addEventListener('click', () => {
                selectedCountry = document.getElementById('citizen-country-select').value;
                nodeTag = standardHierarchies[selectedCountry].tag;
                navigateTo('feed');
            });
        }

        // --- View 3: Government Leadership Structure Onboarding ---
        function renderGovOnboarding() {
            mainContent.innerHTML = `
                <div class="space-y-5 pt-4">
                    <div class="flex items-center gap-2" onclick="navigateTo('portal_select')">
                        <span class="text-xs text-zinc-500 cursor-pointer hover:text-zinc-300">⇜ Back to Access Gate</span>
                    </div>
                    <div>
                        <h2 class="text-xl font-bold tracking-tight text-amber-400">Sovereign Authority Sign-In</h2>
                        <p class="text-xs text-zinc-400">Establish operational binding with your country structure registry.</p>
                    </div>

                    <div class="space-y-4 bg-zinc-900/40 p-5 rounded-2xl border border-zinc-900">
                        <label class="block space-y-1.5">
                            <span class="text-xs font-semibold text-zinc-400 uppercase tracking-wider">Select Jurisdiction</span>
                            <select id="gov-country-select" class="w-full bg-zinc-900 border border-zinc-800 rounded-xl p-3 text-sm text-zinc-200 focus:outline-none focus:border-amber-500">
                                ${Object.keys(standardHierarchies).map(c => `<option value="${c}">${c}</option>`).join('')}
                            </select>
                        </label>

                        <div id="gov-dept-wrapper" class="space-y-1.5">
                            <!-- Injected dynamically by helper function below -->
                        </div>

                        <label class="block space-y-1.5">
                            <span class="text-xs font-semibold text-zinc-400 uppercase tracking-wider">Secret Clearance Key</span>
                            <input type="password" value="••••••••••••••" class="w-full bg-zinc-900 border border-zinc-800 rounded-xl p-3 text-sm text-zinc-400 focus:outline-none" disabled />
                        </label>
                    </div>

                    <button id="btn-confirm-gov" class="w-full bg-amber-500 hover:bg-amber-400 text-zinc-950 font-bold rounded-xl py-3.5 text-sm transition-all">
                        Authenticate Official Terminal
                    </button>
                </div>
            `;

            const countrySelector = document.getElementById('gov-country-select');
            
            function updateDeptDropdown() {
                const c = countrySelector.value;
                const structLabel = standardHierarchies[c].struct;
                const filteredDepts = dynamicDepartments.filter(d => d.country === c);

                let dropdownHtml = `
                    <span class="text-xs font-semibold text-zinc-400 uppercase tracking-wider block">Assigned Autonomous ${structLabel}</span>
                    <select id="gov-dept-select" class="w-full bg-zinc-900 border border-zinc-800 rounded-xl p-3 text-sm text-zinc-200 focus:outline-none focus:border-amber-500">
                `;
                if(filteredDepts.length === 0) {
                    dropdownHtml += `<option value="none">No agencies listed. Create one after login.</option>`;
                } else {
                    filteredDepts.forEach(d => {
                        dropdownHtml += `<option value="${d.id}">${d.name}</option>`;
                    });
                }
                dropdownHtml += `</select>`;
                document.getElementById('gov-dept-wrapper').innerHTML = dropdownHtml;
            }

            countrySelector.addEventListener('change', updateDeptDropdown);
            updateDeptDropdown(); // Base execution

            document.getElementById('btn-confirm-gov').addEventListener('click', () => {
                selectedCountry = countrySelector.value;
                nodeTag = standardHierarchies[selectedCountry].tag;
                const deptSelectBox = document.getElementById('gov-dept-select');
                assignedDeptId = deptSelectBox ? deptSelectBox.value : 'none';
                navigateTo('gov_dashboard');
            });
        }

        // --- View 4: Citizen Core Stream (Subscribed vs Trending Framework) ---
        function renderFeed() {
            updateCitizenNavUI('feed');
            const structuralTerm = standardHierarchies[selectedCountry].struct;
            const followedIds = dynamicDepartments.filter(d => d.followed && d.country === selectedCountry).map(d => d.id);

            let html = `
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-zinc-500">
                        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                    </span>
                    <input type="text" placeholder="Search logs, structural tags, categories..." class="w-full bg-zinc-900/50 border border-zinc-800 rounded-xl py-2.5 pl-10 pr-4 text-sm text-zinc-200 focus:outline-none focus:border-emerald-500/50" />
                </div>

                <div class="space-y-4">
                    <h2 class="text-xs font-bold tracking-wider text-zinc-500 uppercase px-1">Subscribed ${structuralTerm} Stream</h2>
            `;

            const domesticSubscribed = masterTickets.filter(t => t.country === selectedCountry && followedIds.includes(t.deptId));
            if(domesticSubscribed.length === 0) {
                html += `<p class="text-xs text-zinc-600 px-1 italic">No active subscriptions on this node. Toggle directory targets.</p>`;
            } else {
                domesticSubscribed.forEach(t => html += generateTicketCardHtml(t));
            }

            html += `
                </div>
                <div class="space-y-4 pt-2">
                    <h2 class="text-xs font-bold tracking-wider text-amber-500/80 uppercase px-1 flex items-center gap-1">
                        ⚡ Trending National Logs (Other Targets)
                    </h2>
            `;

            const trendingTickets = masterTickets.filter(t => t.country !== selectedCountry || !followedIds.includes(t.deptId));
            if(trendingTickets.length === 0) {
                html += `<p class="text-xs text-zinc-600 px-1 italic">No macro transactional logs outside of scope.</p>`;
            } else {
                trendingTickets.forEach(t => html += generateTicketCardHtml(t));
            }

            html += `</div>`;
            mainContent.innerHTML = html;
        }

        function generateTicketCardHtml(ticket) {
            let resolutionBlock = "";
            if (ticket.govResponse) {
                resolutionBlock = `
                    <div class="bg-emerald-950/20 border border-emerald-900/40 rounded-lg p-3 space-y-2 mt-2">
                        <div class="flex items-center justify-between">
                            <span class="text-xs font-bold text-emerald-400 flex items-center gap-1">🏛️ ${ticket.govResponse.author}</span>
                            <span class="text-[9px] font-mono bg-emerald-500/10 text-emerald-400 px-1.5 py-0.5 rounded uppercase tracking-wider font-bold">Action Dispatched</span>
                        </div>
                        <p class="text-xs text-zinc-300 leading-relaxed">${ticket.govResponse.message}</p>
                        <div class="flex flex-wrap gap-2 pt-1 text-[10px] text-zinc-400 font-mono">
                            <span class="bg-zinc-950 px-2 py-1 rounded border border-zinc-900 flex items-center gap-1">📁 ${ticket.govResponse.attachment}</span>
                            <span class="bg-zinc-950 px-2 py-1 rounded border border-zinc-900 flex items-center gap-1">🖼️ ${ticket.govResponse.media}</span>
                        </div>
                    </div>
                `;
            } else {
                resolutionBlock = `
                    <div class="bg-zinc-900/20 border border-dashed border-zinc-900 rounded-lg p-3 text-center mt-1">
                        <span class="text-[11px] text-zinc-500 italic">Awaiting State Architecture Intervention</span>
                    </div>
                `;
            }

            return `
                <div class="bg-zinc-900/40 border border-zinc-900 rounded-xl p-4 space-y-3 hover:border-zinc-800 transition-all">
                    <div class="flex justify-between items-start gap-4">
                        <div>
                            <span class="text-[9px] font-mono tracking-widest text-zinc-500 uppercase block">${ticket.country} Node</span>
                            <h3 class="font-bold text-sm text-zinc-200 mt-0.5">${ticket.title}</h3>
                            <span class="text-xs text-zinc-400">${ticket.dept}</span>
                        </div>
                        <span class="text-[10px] font-mono px-2 py-0.5 rounded-full uppercase font-bold tracking-wider whitespace-nowrap ${ticket.color}">
                            ${ticket.status}
                        </span>
                    </div>
                    
                    ${ticket.caption ? `<p class="text-xs text-zinc-400 leading-normal">${ticket.caption}</p>` : ''}
                    
                    ${ticket.citizenMedia ? `<div class="text-xs text-zinc-500 font-mono bg-zinc-950 p-2 rounded border border-zinc-900 flex items-center gap-1.5">${ticket.citizenMedia}</div>` : ''}

                    <div class="flex items-center justify-between text-[11px] text-zinc-500 border-t border-zinc-900/60 pt-2">
                        <span>📍 ${ticket.location}</span>
                        <span>⏱️ ${ticket.time}</span>
                    </div>

                    ${resolutionBlock}
                </div>
            `;
        }

        // --- View 5: Directory Framework Control ---
        function renderDepartments() {
            updateCitizenNavUI('departments');
            const term = standardHierarchies[selectedCountry].struct;

            let html = `
                <div class="space-y-2">
                    <h2 class="text-base font-semibold text-zinc-200">${selectedCountry} Agency Matrix</h2>
                    <p class="text-xs text-zinc-500">Subscribe directly to institutional pipelines to track their key performance vectors.</p>
                </div>
                <div class="space-y-2 pt-2">
            `;

            const regionalDepts = dynamicDepartments.filter(d => d.country === selectedCountry);
            if(regionalDepts.length === 0) {
                html += `<p class="text-xs text-zinc-600 italic">No structured agencies active for this node country.</p>`;
            } else {
                regionalDepts.forEach(dept => {
                    html += `
                        <div class="bg-zinc-900/30 border border-zinc-900 p-3 rounded-xl flex items-center justify-between transition-all hover:border-zinc-800">
                            <div class="flex items-center gap-3">
                                <div class="w-8 h-8 rounded-lg bg-zinc-900 border border-zinc-800 flex items-center justify-center text-sm">${dept.icon}</div>
                                <span class="text-xs font-medium text-zinc-200">${dept.name}</span>
                            </div>
                            <button onclick="toggleFollow('${dept.id}')" class="text-xs font-medium px-3 py-1.5 rounded-lg transition-all ${dept.followed ? 'bg-zinc-800 text-zinc-400 hover:text-red-400' : 'bg-emerald-500/10 text-emerald-400 hover:bg-emerald-500 hover:text-zinc-950'}">
                                ${dept.followed ? 'Unsubscribe' : 'Subscribe'}
                            </button>
                        </div>
                    `;
                });
            }

            html += `</div>`;
            mainContent.innerHTML = html;
        }

        window.toggleFollow = function(id) {
            const tgt = dynamicDepartments.find(d => d.id === id);
            if(tgt) { tgt.followed = !tgt.followed; renderDepartments(); }
        };

        // --- View 6: Citizen Ticket Creation System ---
        function renderReportForm() {
            updateCitizenNavUI('report');
            const term = standardHierarchies[selectedCountry].struct;
            const regionalDepts = dynamicDepartments.filter(d => d.country === selectedCountry);

            mainContent.innerHTML = `
                <div class="space-y-4 pt-2">
                    <div>
                        <h2 class="text-base font-semibold text-zinc-200">Log Resolution Ticket</h2>
                        <p class="text-xs text-zinc-500 mt-0.5">Submit geotagged proof directly into active departmental queues.</p>
                    </div>
                    <div class="space-y-3">
                        <label class="block space-y-1.5">
                            <span class="text-xs text-zinc-400 font-medium">Issue Headline</span>
                            <input id="form-title" type="text" placeholder="Describe the structural fault..." class="w-full bg-zinc-900 border border-zinc-800 rounded-xl p-3 text-sm text-zinc-200 focus:outline-none focus:border-zinc-700" />
                        </label>
                        <label class="block space-y-1.5">
                            <span class="text-xs text-zinc-400 font-medium">Target Infrastructure Agency</span>
                            <select id="form-dept" class="w-full bg-zinc-900 border border-zinc-800 rounded-xl p-3 text-sm text-zinc-300 focus:outline-none">
                                ${regionalDepts.map(d => `<option value="${d.id}">${d.name}</option>`).join('')}
                            </select>
                        </label>
                        <label class="block space-y-1.5">
                            <span class="text-xs text-zinc-400 font-medium">Context Caption</span>
                            <textarea id="form-caption" rows="3" placeholder="Provide details for deployment crews..." class="w-full bg-zinc-900 border border-zinc-800 rounded-xl p-3 text-sm text-zinc-200 focus:outline-none resize-none"></textarea>
                        </label>
                        
                        <div id="media-upload-zone" class="border-2 border-dashed border-zinc-800 rounded-xl p-5 text-center hover:bg-zinc-900/20 transition-all cursor-pointer">
                            <span id="upload-status" class="text-xs text-zinc-500 block">Attach Media Verification (Photo/Video)</span>
                        </div>

                        <button id="dispatch-ticket-btn" class="w-full bg-zinc-100 hover:bg-white text-zinc-950 font-bold rounded-xl py-3.5 text-sm transition-all mt-2">
                            Dispatch Verified Ticket
                        </button>
                    </div>
                </div>
            `;

            const uploadZone = document.getElementById('media-upload-zone');
            uploadZone.addEventListener('click', () => {
                uploadedMockMedia = "📸 VALID_ATTACHMENT_" + Math.floor(Math.random() * 8999 + 1000) + ".png";
                document.getElementById('upload-status').innerText = `Linked: ${uploadedMockMedia}`;
                uploadZone.className = "border-2 border-dashed border-emerald-500/40 bg-emerald-500/5 rounded-xl p-5 text-center cursor-pointer";
            });

            document.getElementById('dispatch-ticket-btn').addEventListener('click', () => {
                const dBox = document.getElementById('form-dept');
                if(!dBox.value) return;

                masterTickets.unshift({
                    id: masterTickets.length + 1,
                    country: selectedCountry,
                    title: document.getElementById('form-title').value || "Unspecified Infrastructural Issue",
                    deptId: dBox.value,
                    dept: dBox.options[dBox.selectedIndex].text,
                    status: "Pending",
                    color: "text-zinc-400 bg-zinc-400/10",
                    location: "Current Coordinates",
                    time: "Just Now",
                    caption: document.getElementById('form-caption').value,
                    citizenMedia: uploadedMockMedia,
                    govResponse: null
                });
                uploadedMockMedia = null;
                navigateTo('feed');
            });
        }

        // --- View 7: State Administrator Dashboard Interventions ---
        function renderGovDashboard() {
            updateGovNavUI('gov_dashboard');
            const targetAgency = dynamicDepartments.find(d => d.id === assignedDeptId);
            const agencyName = targetAgency ? targetAgency.name : "Unallocated Hub";

            let html = `
                <div class="space-y-1">
                    <span class="text-[10px] font-mono tracking-wider text-amber-400 block uppercase">${selectedCountry} Node Dashboard</span>
                    <h2 class="text-base font-bold text-zinc-200">${agencyName} Queue</h2>
                </div>
            `;

            const agencyTickets = masterTickets.filter(t => t.deptId === assignedDeptId && t.country === selectedCountry);
            if(agencyTickets.length === 0) {
                html += `<p class="text-xs text-zinc-600 italic pt-4">No citizen resolution tracking logs pending for this queue code.</p>`;
            } else {
                agencyTickets.forEach(t => {
                    html += `
                        <div class="bg-zinc-900/50 border border-zinc-900 rounded-xl p-4 space-y-3">
                            <div class="flex justify-between items-start">
                                <div>
                                    <h4 class="text-sm font-bold text-zinc-200">${t.title}</h4>
                                    <span class="text-xs text-zinc-500">Logged: ${t.time} | Loc: ${t.location}</span>
                                </div>
                                <span class="text-[10px] font-mono px-2 py-0.5 rounded ${t.color}">${t.status}</span>
                            </div>
                            <p class="text-xs text-zinc-400 italic bg-zinc-950 p-2.5 rounded border border-zinc-900">"${t.caption || 'No description asset provided.'}"</p>
                            
                            ${t.govResponse ? `
                                <div class="text-xs text-emerald-400 font-medium bg-emerald-500/5 p-2 rounded border border-emerald-500/10">
                                    ✓ Resolution Logged: "${t.govResponse.message}"
                                </div>
                            ` : `
                                <div class="space-y-2 pt-2 border-t border-zinc-900">
                                    <span class="text-[10px] uppercase font-bold text-zinc-500 tracking-wider block">Deploy Official Countermeasure</span>
                                    <input id="intel-${t.id}" type="text" placeholder="Resolution description, budget log, tracking metrics..." class="w-full bg-zinc-950 border border-zinc-800 rounded-lg p-2 text-xs text-zinc-200 focus:outline-none" />
                                    <button onclick="submitGovIntervention(${t.id})" class="w-full bg-amber-500 text-zinc-950 font-bold py-2 rounded-lg text-xs hover:bg-amber-400 transition-colors">
                                        Dispatch Official Ledger Response
                                    </button>
                                </div>
                            `}
                        </div>
                    `;
                });
            }

            mainContent.innerHTML = html;
        }

        window.submitGovIntervention = function(ticketId) {
            const msg = document.getElementById(`intel-${ticketId}`).value;
            if(!msg) return;

            const t = masterTickets.find(ticket => ticket.id === ticketId);
            if(t) {
                t.status = "Resolved";
                t.color = "text-emerald-400 bg-emerald-400/10";
                t.govResponse = {
                    author: "Official Terminal Hub",
                    message: msg,
                    attachment: "📄 Budget_Release_Verified.pdf",
                    media: "📸 Verification_Data.png"
                };
                renderGovDashboard();
            }
        };

        // --- View 8: Global Agency Generation Terminal ---
        function renderCreateDepartment() {
            updateGovNavUI('create_dept');
            const currentStruct = standardHierarchies[selectedCountry].struct;

            mainContent.innerHTML = `
                <div class="space-y-4 pt-2">
                    <div>
                        <h2 class="text-base font-bold text-zinc-200">Register New Institutional Target</h2>
                        <p class="text-xs text-zinc-500 mt-0.5">Instantiate a functional operational agency inside the ${selectedCountry} framework hierarchy.</p>
                    </div>

                    <div class="space-y-3 bg-zinc-900/30 p-4 rounded-xl border border-zinc-900">
                        <label class="block space-y-1.5">
                            <span class="text-xs text-zinc-400 font-medium">Agency / ${currentStruct} Name</span>
                            <input id="new-dept-name" type="text" placeholder="e.g., National Environmental Inspectorate" class="w-full bg-zinc-900 border border-zinc-800 rounded-xl p-3 text-sm text-zinc-200 focus:outline-none" />
                        </label>
                        
                        <label class="block space-y-1.5">
                            <span class="text-xs text-zinc-400 font-medium">Identification Icon Glyph</span>
                            <select id="new-dept-icon" class="w-full bg-zinc-900 border border-zinc-800 rounded-xl p-3 text-sm text-zinc-300 focus:outline-none">
                                <option value="🛡️">🛡️ Security / Enforcement</option>
                                <option value="🌱">🌱 Agriculture & Environment</option>
                                <option value="🏥">🏥 Healthcare & Wellness</option>
                                <option value="🏫">🏫 Education & Facilities</option>
                                <option value="🏛️">🏛️ Executive Council / Treasury</option>
                            </select>
                        </label>
                    </div>

                    <button id="btn-save-dept" class="w-full bg-amber-500 hover:bg-amber-400 text-zinc-950 font-bold rounded-xl py-3 text-sm transition-all shadow-lg">
                        Instantiate Agency Node
                    </button>
                </div>
            `;

            document.getElementById('btn-save-dept').addEventListener('click', () => {
                const n = document.getElementById('new-dept-name').value;
                if(!n) return;

                const newId = "dept_" + Date.now();
                dynamicDepartments.push({
                    id: newId,
                    country: selectedCountry,
                    name: n,
                    followed: false,
                    icon: document.getElementById('new-dept-icon').value
                });

                assignedDeptId = newId; 
                navigateTo('gov_dashboard');
            });
        }

        // --- Application Bootstrap ---
        navigateTo('portal_select');
    </script>
</body>
</html>
